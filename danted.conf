# danted.conf for docker-danted, based on the original danted.conf/sockd.conf
#
# This file is the default configuration shipped with the container image.
# By default, entrypoint.sh auto-generates a config to /tmp/danted.conf
# with detected addresses — this file is not used at runtime unless you
# set DANTE_CONFIG_FILE.
#
# To use this file as-is, mount it read-only and set DANTE_CONFIG_FILE:
#   -v /path/to/danted.conf:/etc/danted.conf:ro -e DANTE_CONFIG_FILE=/etc/danted.conf
#
# The config file is divided into three parts:
#    1) server settings
#    2) rules
#    3) routes
#
# The recommended order is:
#   Server settings:
#               logoutput
#               internal
#               external
#               socksmethod
#               clientmethod
#               users
#               compatibility
#               extension
#               timeout
#               srchost
#
#  Rules:
#        client block/pass
#                from to
#                libwrap
#                log
#
#     block/pass
#                from to
#                socksmethod
#                command
#                libwrap
#                log
#                protocol
#                proxyprotocol
#
#  Routes:

# Log to stderr so Docker captures all output via `docker logs`.
logoutput: stderr

# Listen on all interfaces, both IPv4 and IPv6.
# Port is overridable via DANTE_PORT environment variable (default: 1080).
internal: 0.0.0.0 port = 1080
internal: :: port = 1080

# External addresses are auto-detected from container network interfaces
# at startup by entrypoint.sh. When using this file with DANTE_SKIP_AUTOCONFIG=1,
# you must configure external addresses manually.
#
# Examples:
#external: 192.168.1.1
#external: 2001:db8::1
#
# __EXTERNAL_IPV4__
# __EXTERNAL_IPV6__

# Rotation mode for outbound source address selection.
# same-same: outbound source IP matches the IP the client connected to.
#            Ideal for per-IP rate limit separation with multiple addresses.
# route:     use the routing table (allows cross-protocol IPv4<->IPv6).
# none:      always use the first external address.
external.rotation: same-same

# Authentication methods.
# No authentication required — open proxy for trusted networks only.
socksmethod: none
clientmethod: none

#or if you want to allow rfc931 (ident) too
#socksmethod: username rfc931 none

#or for PAM authentication
#socksmethod: pam

#
# User identities
#

# when doing something that can require privilege, it will use the userid:
user.privileged: root

# when running as usual, it will use the unprivileged userid of:
user.unprivileged: nobody

# If you compiled with libwrap support, what userid should it use
# when executing your libwrap commands?
#user.libwrap: nobody


#
# Some options to help clients with compatibility:
#

# when a client connection comes in the socks server will try to use
# the same port as the client is using, when the socks server
# goes out on the clients behalf (external: IP address).
# If this option is set, Dante will try to do it for reserved ports as well.
# This will usually require user.privileged to be set to "root".
#compatibility: sameport

# If you are using the Inferno Nettverk bind extension and have trouble
# running servers via the server, you might try setting this.
#compatibility: reuseaddr

#
# The Dante server supports some extensions to the socks protocol.
# These require that the socks client implements the same extension and
# can be enabled using the "extension" keyword.
#
# enable the bind extension.
#extension: bind


#
# Misc options.
#

# how many seconds can pass from when a client connects till it has
# sent us its request?  Adjust according to your network performance
# and methods supported.
#timeout.negotiate: 30   # on a lan, this should be enough.

# how many seconds can the client and its peer idle without sending
# any data before we dump it?  Unless you disable tcp keep-alive for
# some reason, it's probably best to set this to 0, which is
# "forever".
#timeout.io: 0 # or perhaps 86400, for a day.

# do you want to accept connections from addresses without
# dns info?  what about addresses having a mismatch in dns info?
#srchost: nodnsunknown nodnsmismatch


#
# Client rules — who is allowed to connect to the server.
#
# It is especially important that these only use IP addresses, not
# hostnames, for security reasons.
#

# Allow connections from any source to any address the server listens on.
client pass {
  from: 0/0 to: 0/0
  log: error
}


#
# SOCKS rules — what requests clients are allowed to make.
#

# you probably don't want people connecting to loopback addresses,
# who knows what could happen then.
#socks block {
#        from: 0.0.0.0/0 to: lo0
#        log: connect error
#}

# Allow all outbound connections (connect, bind, udpassociate).
socks pass {
  from: 0/0 to: 0/0
  command: bind connect udpassociate
  log: error
}

# last line, block everyone else.  This is the default but if you provide
# one yourself you can specify your own logging/actions
#socks block {
#        from: 0.0.0.0/0 to: 0.0.0.0/0
#        log: connect error
#}

# route all http connects via an upstream socks server, aka "server-chaining".
#route {
# from: 10.0.0.0/8 to: 0.0.0.0/0 port = http via: socks.example.net port = socks
#}
