services:
  danted:
    build: .
    image: ghcr.io/colin-stubbs/docker-danted:latest
    container_name: danted
    restart: unless-stopped
    read_only: true
    env_file: .env
    ports:
      - "1080:1080"
    tmpfs:
      - /tmp:noexec,nosuid,size=1m
      - /run:nosuid,size=8m
    networks:
      proxy_net:
        ipv4_address: 172.28.0.10
        ipv6_address: 2001:db8:1::10
    # Needed if you want to add extra interface addresses from inside container.
    #cap_add:
    #  - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0

networks:
  proxy_net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
        - subnet: 2001:db8:1::/64
          gateway: 2001:db8:1::1
